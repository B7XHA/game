Enter<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة الألعاب</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1200px;
            overflow: hidden;
            display: flex;
            flex-direction: row-reverse;
        }
        
        /* القائمة الجانبية */
        .sidebar {
            width: 280px;
            background: #2d3748;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding-bottom: 20px;
            border-bottom: 1px solid #4a5568;
            margin-bottom: 20px;
        }
        
        .sidebar-header h3 {
            font-size: 18px;
            color: #cbd5e0;
            margin-bottom: 10px;
        }
        
        .room-info {
            background: #1a202c;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .room-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #a0aec0;
        }
        
        .room-info span {
            color: #ecc94b;
            font-weight: bold;
        }
        
        .players-list {
            flex: 1;
            overflow-y: auto;
            max-height: 500px;
        }
        
        .player-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #1a202c;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        .player-item:hover {
            background: #4a5568;
            transform: translateX(-5px);
        }
        
        .player-avatar {
            width: 40px;
            height: 40px;
            background: #4a5568;
            border-radius: 50%;
            margin-left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e0;
            font-weight: bold;
            font-size: 18px;
        }
        
        .player-info {
            flex: 1;
        }
        
        .player-name {
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
        }
        
        .player-status {
            font-size: 12px;
            color: #a0aec0;
        }
        
        .admin-badge {
            background: #ecc94b;
            color: #1a202c;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-right: 8px;
            font-weight: bold;
        }
        
        .spectator-badge {
            background: #48bb78;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-right: 8px;
        }
        
        .player-ready {
            color: #48bb78;
            font-size: 12px;
            margin-right: 5px;
        }
        
        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            padding: 30px;
            background: #f7fafc;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .game-title {
            font-size: 24px;
            color: #2d3748;
            font-weight: bold;
        }
        
        .game-status {
            background: #ecc94b;
            color: #1a202c;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .game-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            min-height: 300px;
        }
        
        .game-selection {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .game-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            width: 200px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.5;
            pointer-events: none;
        }
        
        .game-card.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .game-card.active:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .game-card.selected {
            border: 3px solid #ecc94b;
            transform: scale(1.05);
        }
        
        .game-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .game-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .players-required {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .game-board {
            display: none;
        }
        
        .game-board.active {
            display: block;
        }
        
        /* لعبة XO */
        .xo-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }
        
        .xo-cell {
            aspect-ratio: 1;
            background: #edf2f7;
            border: 2px solid #cbd5e0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .xo-cell:hover:not(.disabled) {
            background: #e2e8f0;
            transform: scale(1.05);
        }
        
        .xo-cell.disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .xo-cell.x {
            color: #e53e3e;
        }
        
        .xo-cell.o {
            color: #3182ce;
        }
        
        .waiting-message {
            text-align: center;
            padding: 40px;
            color: #718096;
        }
        
        .players-vote {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .vote-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.5;
            pointer-events: none;
        }
        
        .vote-btn.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .vote-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }
        
        .vote-btn.selected {
            background: #2d3748;
        }
        
        .vote-btn.voted {
            background: #ecc94b;
            color: #1a202c;
        }
        
        .vote-status {
            text-align: center;
            margin: 10px 0;
            color: #718096;
            font-size: 14px;
        }
        
        .start-game-btn {
            background: #ecc94b;
            color: #1a202c;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 20px;
            display: none;
        }
        
        .start-game-btn.active {
            display: block;
        }
        
        .start-game-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(236, 201, 75, 0.4);
        }
        
        .chat-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .chat-messages {
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            background: #f7fafc;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .chat-message {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: #e2e8f0;
            border-radius: 10px;
            max-width: 80%;
        }
        
        .chat-message.own {
            background: #667eea;
            color: white;
            margin-right: auto;
        }
        
        .chat-input-area {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .chat-send {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .chat-send:hover {
            background: #5a67d8;
        }
        
        .hidden {
            display: none !important;
        }
        
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- القائمة الجانبية -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>معلومات الغرفة</h3>
                <div class="room-info">
                    <p>👤 الآيدي: <span id="roomId">...</span></p>
                    <p>👥 عدد اللاعبين: <span id="playerCount">0</span></p>
                </div>
            </div>
            
            <h3>اللاعبون والمتفرجون</h3>
            <div class="players-list" id="playersList">
                <!-- سيتم إضافة اللاعبين هنا ديناميكياً -->
            </div>
        </div>
        
        <!-- المحتوى الرئيسي -->
        <div class="main-content">
            <div class="game-header">
                <div class="game-title" id="gameTitle">غرفة الألعاب</div>
                <div class="game-status" id="gameStatus">في انتظار اللاعبين...</div>
            </div>
            
            <!-- منطقة اختيار اللعبة -->
            <div class="game-area" id="gameSelectionArea">
                <h3 style="margin-bottom: 20px; color: #2d3748;">اختر اللعبة</h3>
                <div class="game-selection" id="gameSelection">
                    <div class="game-card" data-game="xo" id="gameXOCard">
                        <div class="game-icon">❌⭕</div>
                        <div class="game-name">XO</div>
                        <div class="players-required">يحتاج لاعبين</div>
                    </div>
                    <div class="game-card" data-game="connect4" id="gameConnect4Card">
                        <div class="game-icon">🟡🔴</div>
                        <div class="game-name">Connect 4</div>
                        <div class="players-required">يحتاج لاعبين</div>
                    </div>
                    <div class="game-card" data-game="tic-tac-toe" id="gameTicTacToeCard">
                        <div class="game-icon">🎮</div>
                        <div class="game-name">Tic Tac Toe</div>
                        <div class="players-required">يحتاج لاعبين</div>
                    </div>
                </div>
                
                <!-- نظام التصويت -->
                <div class="vote-status" id="voteStatus"></div>
                <div class="players-vote" id="playersVote">
                    <button class="vote-btn" data-game="xo" id="voteXOBtn">❌⭕ XO</button>
                    <button class="vote-btn" data-game="connect4" id="voteConnect4Btn">🟡🔴 Connect 4</button>
                    <button class="vote-btn" data-game="tic-tac-toe" id="voteTicTacToeBtn">🎮 Tic Tac Toe</button>
                </div>
                
                <button class="start-game-btn" id="startGameBtn">بدء اللعبة</button>
            </div>
            
            <!-- منطقة اللعبة -->
            <div class="game-area hidden" id="gamePlayArea">
                <div class="game-board active" id="xoBoard">
                    <div class="xo-board" id="xoBoardGrid">
                        <!-- سيتم إنشاء خلايا XO هنا -->
                    </div>
                </div>
                
                <div class="game-board" id="connect4Board">
                    <div style="text-align: center; padding: 50px; color: #718096;">
                        قريباً...
                    </div>
                </div>
                
                <div class="game-board" id="ticTacToeBoard">
                    <div style="text-align: center; padding: 50px; color: #718096;">
                        قريباً...
                    </div>
                </div>
            </div>
            
            <!-- منطقة الدردشة -->
            <div class="chat-area">
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-message">مرحباً بكم في غرفة الألعاب!</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="اكتب رسالة...">
                    <button class="chat-send" id="chatSendBtn">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <script>
        // الحصول على معلمات URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const userId = urlParams.get('user');
        const userName = urlParams.get('name') || 'زائر';
        const creatorId = urlParams.get('creator');
        
        // التحقق من المعلمات
        if (!roomId || !userId) {
            document.body.innerHTML = '<div style="text-align: center; padding: 50px; color: white;">رابط غير صالح</div>';
            throw new Error('Missing required parameters');
        }
        
        // حالة اللعبة
        const state = {
            roomId,
            userId,
            userName,
            creatorId,
            users: {},
            players: [],
            spectators: [],
            gameSelected: null,
            votes: {},
            gameStarted: false,
            xoBoard: ['', '', '', '', '', '', '', '', ''],
            xoCurrentPlayer: null,
            xoPlayers: {},
            socket: null
        };
        
        // عناصر DOM
        const elements = {
            roomId: document.getElementById('roomId'),
            playerCount: document.getElementById('playerCount'),
            playersList: document.getElementById('playersList'),
            gameStatus: document.getElementById('gameStatus'),
            gameSelectionArea: document.getElementById('gameSelectionArea'),
            gamePlayArea: document.getElementById('gamePlayArea'),
            startGameBtn: document.getElementById('startGameBtn'),
            voteStatus: document.getElementById('voteStatus'),
            xoBoardGrid: document.getElementById('xoBoardGrid'),
            chatMessages: document.getElementById('chatMessages'),
            chatInput: document.getElementById('chatInput'),
            chatSendBtn: document.getElementById('chatSendBtn')
        };
        
        // أزرار التصويت
        const voteBtns = {
            xo: document.getElementById('voteXOBtn'),
            connect4: document.getElementById('voteConnect4Btn'),
            ticTacToe: document.getElementById('voteTicTacToeBtn')
        };
        
        // تهيئة
        function init() {
            elements.roomId.textContent = roomId;
            
            // الاتصال بالخادم
            connectToServer();
            
            // إضافة مستمعي الأحداث
            addEventListeners();
        }
        
        // الاتصال بالخادم
        function connectToServer() {
            // هنا يتم الاتصال بالخادم الخاص بك
            // استخدم WebSocket أو Socket.IO
            console.log('Connecting to server...');
            
            // مثال باستخدام WebSocket (يجب تعديل الرابط)
            // state.socket = new WebSocket(`wss://yourserver.com/ws?room=${roomId}&user=${userId}`);
            
            // محاكاة للاختبار
            simulateServer();
        }
        
        // محاكاة الخادم للاختبار
        function simulateServer() {
            // إضافة المستخدم الحالي
            state.users[userId] = {
                id: userId,
                name: userName,
                isCreator: userId === creatorId,
                isPlayer: false,
                isSpectator: true,
                ready: false
            };
            
            // تحديث القوائم
            updatePlayersList();
        }
        
        // إضافة مستمعي الأحداث
        function addEventListeners() {
            // أزرار التصويت
            for (const [game, btn] of Object.entries(voteBtns)) {
                btn.addEventListener('click', () => voteForGame(game));
            }
            
            // زر بدء اللعبة
            elements.startGameBtn.addEventListener('click', startGame);
            
            // إرسال الرسائل
            elements.chatSendBtn.addEventListener('click', sendChatMessage);
            elements.chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendChatMessage();
            });
        }
        
        // التصويت للعبة
        function voteForGame(game) {
            if (state.gameStarted) return;
            
            state.votes[userId] = game;
            
            // تحديث واجهة التصويت
            updateVoteUI();
            
            // التحقق من إمكانية بدء اللعبة
            checkCanStartGame();
        }
        
        // تحديث واجهة التصويت
        function updateVoteUI() {
            const players = Object.values(state.users).filter(u => u.isPlayer);
            
            for (const [game, btn] of Object.entries(voteBtns)) {
                const votes = Object.values(state.votes).filter(v => v === game).length;
                const totalPlayers = players.length;
                
                if (totalPlayers > 0) {
                    const percentage = (votes / totalPlayers) * 100;
                    btn.textContent = `${btn.textContent.split('(')[0]} (${votes}/${totalPlayers})`;
                    
                    if (votes === totalPlayers) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                }
            }
            
            // تحديث حالة التصويت
            if (players.length === 2) {
                const votes1 = state.votes[players[0]?.id];
                const votes2 = state.votes[players[1]?.id];
                
                if (votes1 && votes2) {
                    if (votes1 === votes2) {
                        elements.voteStatus.textContent = `✅ تم الاتفاق على لعبة ${getGameName(votes1)}`;
                        state.gameSelected = votes1;
                    } else {
                        elements.voteStatus.textContent = '❌ لم يتم الاتفاق بعد';
                    }
                }
            }
        }
        
        // التحقق من إمكانية بدء اللعبة
        function checkCanStartGame() {
            const players = Object.values(state.users).filter(u => u.isPlayer);
            
            if (players.length === 2) {
                const votes1 = state.votes[players[0]?.id];
                const votes2 = state.votes[players[1]?.id];
                
                if (votes1 && votes2 && votes1 === votes2) {
                    elements.startGameBtn.classList.add('active');
                } else {
                    elements.startGameBtn.classList.remove('active');
                }
            }
        }
        
        // بدء اللعبة
        function startGame() {
            if (!state.gameSelected) return;
            
            state.gameStarted = true;
            elements.gameSelectionArea.classList.add('hidden');
            elements.gamePlayArea.classList.remove('hidden');
            elements.gameStatus.textContent = `اللعبة: ${getGameName(state.gameSelected)}`;
            
            // تهيئة اللعبة المختارة
            initGame(state.gameSelected);
        }
        
        // تهيئة اللعبة
        function initGame(game) {
            switch(game) {
                case 'xo':
                    initXOGame();
                    break;
                case 'connect4':
                    // تهيئة Connect 4
                    break;
                case 'tic-tac-toe':
                    // تهيئة Tic Tac Toe
                    break;
            }
        }
        
        // تهيئة لعبة XO
        function initXOGame() {
            const players = Object.values(state.users).filter(u => u.isPlayer);
            if (players.length >= 2) {
                state.xoPlayers = {
                    [players[0].id]: 'X',
                    [players[1].id]: 'O'
                };
                state.xoCurrentPlayer = players[0].id;
                
                createXOBoard();
                updateGameStatus();
            }
        }
        
        // إنشاء لوحة XO
        function createXOBoard() {
            elements.xoBoardGrid.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'xo-cell';
                cell.dataset.index = i;
                cell.textContent = state.xoBoard[i];
                
                if (state.xoBoard[i]) {
                    cell.classList.add('disabled', state.xoBoard[i].toLowerCase());
                }
                
                cell.addEventListener('click', () => makeXOMove(i));
                elements.xoBoardGrid.appendChild(cell);
            }
        }
        
        // تنفيذ حركة في XO
        function makeXOMove(index) {
            if (!state.gameStarted || state.xoBoard[index] || state.xoCurrentPlayer !== userId) {
                return;
            }
            
            const symbol = state.xoPlayers[userId];
            state.xoBoard[index] = symbol;
            
            // تحديث اللوحة
            const cells = elements.xoBoardGrid.children;
            cells[index].textContent = symbol;
            cells[index].classList.add('disabled', symbol.toLowerCase());
            
            // التحقق من الفوز
            const winner = checkXOWinner();
            if (winner) {
                elements.gameStatus.textContent = `🏆 الفائز: ${winner === 'X' ? 'اللاعب X' : 'اللاعب O'}`;
                state.gameStarted = false;
                return;
            }
            
            // التحقق من التعادل
            if (!state.xoBoard.includes('')) {
                elements.gameStatus.textContent = '🤝 تعادل!';
                state.gameStarted = false;
                return;
            }
            
            // تبديل اللاعب
            const players = Object.values(state.users).filter(u => u.isPlayer);
            state.xoCurrentPlayer = state.xoCurrentPlayer === players[0].id ? players[1].id : players[0].id;
            
            updateGameStatus();
        }
        
        // التحقق من الفوز في XO
        function checkXOWinner() {
            const winPatterns = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // أفقية
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // رأسية
                [0, 4, 8], [2, 4, 6] // قطرية
            ];
            
            for (const pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (state.xoBoard[a] && state.xoBoard[a] === state.xoBoard[b] && state.xoBoard[a] === state.xoBoard[c]) {
                    return state.xoBoard[a];
                }
            }
            
            return null;
        }
        
        // تحديث حالة اللعبة
        function updateGameStatus() {
            const player = Object.values(state.users).find(u => u.id === state.xoCurrentPlayer);
            elements.gameStatus.textContent = `دور: ${player?.name || 'اللاعب الآخر'}`;
        }
        
        // تحديث قائمة اللاعبين
        function updatePlayersList() {
            const players = Object.values(state.users).filter(u => u.isPlayer);
            const spectators = Object.values(state.users).filter(u => !u.isPlayer);
            
            let html = '';
            
            // عرض اللاعبين
            if (players.length > 0) {
                html += '<div style="margin-bottom: 10px;"><strong>👥 اللاعبون:</strong></div>';
                players.forEach(player => {
                    html += createPlayerHTML(player, true);
                });
            }
            
            // عرض المتفرجين
            if (spectators.length > 0) {
                html += '<div style="margin: 15px 0 10px 0;"><strong>👀 المتفرجون:</strong></div>';
                spectators.forEach(spectator => {
                    html += createPlayerHTML(spectator, false);
                });
            }
            
            elements.playersList.innerHTML = html;
            elements.playerCount.textContent = players.length + spectators.length;
        }
        
        // إنشاء HTML للاعب
        function createPlayerHTML(player, isPlayer) {
            const avatar = player.name.charAt(0).toUpperCase();
            const isCreator = player.id === creatorId;
            const isCurrent = player.id === userId;
            
            let badges = '';
            if (isCreator) badges += '<span class="admin-badge">👑 منشئ</span>';
            if (isPlayer) badges += '<span class="spectator-badge">🎮 لاعب</span>';
            else badges += '<span class="spectator-badge">👀 متفرج</span>';
            
            const readyStatus = player.ready ? '<span class="player-ready">✅ جاهز</span>' : '';
            
            return `
                <div class="player-item" style="${isCurrent ? 'border: 2px solid #667eea;' : ''}">
                    <div class="player-avatar">${avatar}</div>
                    <div class="player-info">
                        <div class="player-name">
                            ${player.name} ${badges} ${readyStatus}
                        </div>
                        <div class="player-status">${player.id.substring(0, 8)}...</div>
                    </div>
                </div>
            `;
        }
        
        // إرسال رسالة
        function sendChatMessage() {
            const message = elements.chatInput.value.trim();
            if (!message) return;
            
            addChatMessage(userName, message, true);
            elements.chatInput.value = '';
            
            // هنا يتم إرسال الرسالة للخادم
        }
        
        // إضافة رسالة للدردشة
        function addChatMessage(sender, message, isOwn = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${isOwn ? 'own' : ''}`;
            msgDiv.textContent = `${sender}: ${message}`;
            
            elements.chatMessages.appendChild(msgDiv);
            elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
        }
        
        // الحصول على اسم اللعبة
        function getGameName(game) {
            const names = {
                xo: 'XO',
                connect4: 'Connect 4',
                'tic-tac-toe': 'Tic Tac Toe'
            };
            return names[game] || game;
        }
        
        // بدء التطبيق
        init();
    </script>
</body>
  </html>
