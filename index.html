<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>غرفة الألعاب التفاعلية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tajawal', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }
        
        .game-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: row-reverse;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }
        
        /* القائمة الجانبية - تصميم عصري */
        .sidebar {
            width: 320px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
        }
        
        .sidebar-header {
            padding: 25px 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sidebar-header h2 span {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: normal;
        }
        
        .room-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .room-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #cbd5e1;
        }
        
        .room-info-item span {
            color: #fbbf24;
            font-weight: bold;
            background: rgba(251, 191, 36, 0.2);
            padding: 3px 10px;
            border-radius: 20px;
        }
        
        .section-title {
            padding: 20px 20px 10px;
            font-size: 16px;
            color: #94a3b8;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .players-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px 15px;
        }
        
        .player-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .player-card:hover {
            transform: translateX(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6;
        }
        
        .player-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            margin-left: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: white;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }
        
        .player-info {
            flex: 1;
        }
        
        .player-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .badge {
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge.creator {
            background: #fbbf24;
            color: #0f172a;
        }
        
        .badge.player {
            background: #3b82f6;
            color: white;
        }
        
        .badge.spectator {
            background: #64748b;
            color: white;
        }
        
        .badge.online {
            background: #10b981;
            color: white;
        }
        
        .player-status {
            font-size: 12px;
            color: #94a3b8;
        }
        
        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.02);
            overflow: hidden;
        }
        
        .game-header {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .game-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .game-status {
            background: rgba(59, 130, 246, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #3b82f6;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        
        .game-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        /* شاشة اختيار اللعبة */
        .selection-screen {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        
        .selection-title {
            font-size: 32px;
            color: white;
            margin-bottom: 30px;
            font-weight: 700;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        
        .game-card:hover::before {
            transform: translateX(0);
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4);
            border-color: #3b82f6;
        }
        
        .game-card.selected {
            border: 2px solid #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        
        .game-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        
        .game-name {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
        }
        
        .game-desc {
            color: #94a3b8;
            font-size: 14px;
        }
        
        .vote-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .vote-title {
            font-size: 20px;
            color: white;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .vote-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .vote-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .vote-btn:hover:not(:disabled) {
            background: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .vote-btn.voted {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        
        .vote-btn.selected {
            background: #fbbf24;
            color: #0f172a;
            border-color: #fbbf24;
        }
        
        .vote-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .vote-status {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 15px;
        }
        
        .start-game-btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #0f172a;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            max-width: 300px;
            margin: 30px auto 0;
            display: none;
        }
        
        .start-game-btn.active {
            display: block;
            animation: pulse 2s infinite;
        }
        
        .start-game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(245, 158, 11, 0.4);
        }
        
        /* شاشة اللعب */
        .play-screen {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        
        .xo-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 30px;
            margin-bottom: 30px;
        }
        
        .xo-cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }
        
        .xo-cell:hover:not(.disabled) {
            background: #3b82f6;
            transform: scale(1.05);
            border-color: #3b82f6;
        }
        
        .xo-cell.x {
            color: #ef4444;
        }
        
        .xo-cell.o {
            color: #3b82f6;
        }
        
        .xo-cell.disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* الدردشة */
        .chat-area {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
        }
        
        .chat-messages {
            height: 120px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }
        
        .chat-message {
            margin-bottom: 8px;
            padding: 8px 15px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            max-width: 80%;
            color: white;
            font-size: 14px;
        }
        
        .chat-message.own {
            background: #3b82f6;
            margin-right: auto;
        }
        
        .chat-message.system {
            background: #fbbf24;
            color: #0f172a;
            text-align: center;
            max-width: 100%;
        }
        
        .chat-input-area {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            font-size: 14px;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .chat-send {
            background: #3b82f6;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-send:hover {
            background: #2563eb;
            transform: scale(1.1);
        }
        
        .hidden {
            display: none !important;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: 40vh;
            }
            
            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- القائمة الجانبية -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>
                    🎮 غرفة الألعاب
                    <span id="roomId">...</span>
                </h2>
                <div class="room-info">
                    <div class="room-info-item">
                        <span>👥 المشاهدون</span>
                        <span id="playerCount">0</span>
                    </div>
                    <div class="room-info-item">
                        <span>🎯 الحالة</span>
                        <span id="roomStatus">انتظار</span>
                    </div>
                </div>
            </div>
            
            <div class="section-title">👤 اللاعبون</div>
            <div class="players-list" id="playersList"></div>
        </div>
        
        <!-- المحتوى الرئيسي -->
        <div class="main-content">
            <div class="game-header">
                <div class="game-title" id="gameTitle">🎮 اختار لعبتك</div>
                <div class="game-status" id="gameStatus">في انتظار اللاعبين...</div>
            </div>
            
            <div class="game-area">
                <!-- شاشة اختيار اللعبة -->
                <div id="selectionScreen" class="selection-screen">
                    <div class="selection-title">اختر اللعبة</div>
                    <div class="games-grid" id="gamesGrid">
                        <div class="game-card" data-game="xo" id="gameXOCard">
                            <div class="game-icon">❌⭕</div>
                            <div class="game-name">XO</div>
                            <div class="game-desc">اللعبة الكلاسيكية</div>
                        </div>
                        <div class="game-card" data-game="connect4" id="gameConnect4Card">
                            <div class="game-icon">🟡🔴</div>
                            <div class="game-name">Connect 4</div>
                            <div class="game-desc">قريباً</div>
                        </div>
                    </div>
                    
                    <div class="vote-section">
                        <div class="vote-title">🗳️ تصويت اللاعبين</div>
                        <div class="vote-buttons" id="voteButtons">
                            <button class="vote-btn" data-game="xo" id="voteXOBtn">
                                <span>❌⭕</span> XO
                            </button>
                        </div>
                        <div class="vote-status" id="voteStatus">في انتظار تصويت اللاعبين...</div>
                        <button class="start-game-btn" id="startGameBtn">▶️ بدء اللعبة</button>
                    </div>
                </div>
                
                <!-- شاشة اللعب -->
                <div id="playScreen" class="play-screen hidden">
                    <div class="xo-board" id="xoBoard"></div>
                </div>
            </div>
            
            <!-- الدردشة -->
            <div class="chat-area">
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-message system">مرحباً بكم في غرفة الألعاب</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="اكتب رسالة...">
                    <button class="chat-send" id="chatSendBtn">📤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // الحصول على معلمات URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const userId = urlParams.get('user');
        const userName = urlParams.get('name') || 'زائر';
        const user2Id = urlParams.get('user2');
        const user2Name = urlParams.get('name2') || 'اللاعب الثاني';
        const creatorId = urlParams.get('creator');
        
        if (!roomId || !userId) {
            document.body.innerHTML = '<div style="color: white; text-align: center; padding: 50px;">❌ رابط غير صالح</div>';
            throw new Error('Missing parameters');
        }
        
        // حالة اللعبة
        const state = {
            roomId, userId, userName, user2Id, user2Name, creatorId,
            users: {},
            gameSelected: null,
            votes: {},
            gameStarted: false,
            xoBoard: Array(9).fill(''),
            xoCurrentPlayer: null,
            xoPlayers: {},
            isPlayer: false
        };
        
        // تحديد إذا كان المستخدم لاعباً أم متفرجاً
        if (userId === creatorId || userId === user2Id) {
            state.isPlayer = true;
            state.users[userId] = {
                id: userId,
                name: userName,
                isCreator: userId === creatorId,
                isPlayer: true,
                joined: true
            };
            
            if (user2Id) {
                state.users[user2Id] = {
                    id: user2Id,
                    name: user2Name,
                    isCreator: user2Id === creatorId,
                    isPlayer: true,
                    joined: false
                };
            }
        } else {
            // متفرج
            state.users[userId] = {
                id: userId,
                name: userName,
                isCreator: false,
                isPlayer: false,
                joined: true
            };
        }
        
        // عناصر DOM
        const elements = {
            roomId: document.getElementById('roomId'),
            playerCount: document.getElementById('playerCount'),
            playersList: document.getElementById('playersList'),
            roomStatus: document.getElementById('roomStatus'),
            gameStatus: document.getElementById('gameStatus'),
            selectionScreen: document.getElementById('selectionScreen'),
            playScreen: document.getElementById('playScreen'),
            startGameBtn: document.getElementById('startGameBtn'),
            voteStatus: document.getElementById('voteStatus'),
            xoBoard: document.getElementById('xoBoard'),
            chatMessages: document.getElementById('chatMessages'),
            chatInput: document.getElementById('chatInput'),
            chatSendBtn: document.getElementById('chatSendBtn'),
            gameXOCard: document.getElementById('gameXOCard'),
            voteXOBtn: document.getElementById('voteXOBtn')
        };
        
        // تهيئة
        function init() {
            elements.roomId.textContent = roomId;
            updatePlayersList();
            addEventListeners();
            
            // محاكاة انضمام اللاعب الثاني بعد ثانية
            if (user2Id && userId !== user2Id) {
                setTimeout(() => {
                    if (state.users[user2Id]) {
                        state.users[user2Id].joined = true;
                        updatePlayersList();
                        addSystemMessage(`🎮 انضم ${user2Name} إلى الغرفة`);
                    }
                }, 1000);
            }
        }
        
        function addEventListeners() {
            elements.gameXOCard.addEventListener('click', () => voteForGame('xo'));
            elements.voteXOBtn.addEventListener('click', () => voteForGame('xo'));
            elements.startGameBtn.addEventListener('click', startGame);
            elements.chatSendBtn.addEventListener('click', sendChatMessage);
            elements.chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendChatMessage();
            });
        }
        
        function voteForGame(game) {
            if (state.gameStarted || !state.isPlayer) return;
            
            state.votes[userId] = game;
            updateVoteUI();
            checkCanStartGame();
            addSystemMessage(`${userName} صوت للعبة ${game === 'xo' ? 'XO' : game}`);
        }
        
        function updateVoteUI() {
            const players = Object.values(state.users).filter(u => u.isPlayer && u.joined);
            const votesForXO = Object.values(state.votes).filter(v => v === 'xo').length;
            
            if (players.length === 2) {
                elements.voteXOBtn.textContent = `❌⭕ XO (${votesForXO}/2)`;
                
                if (votesForXO === 2) {
                    elements.voteXOBtn.classList.add('selected');
                    state.gameSelected = 'xo';
                    elements.voteStatus.textContent = '✅ تم الاتفاق على لعبة XO';
                } else {
                    elements.voteXOBtn.classList.remove('selected');
                    elements.voteStatus.textContent = '⏳ في انتظار تصويت اللاعب الآخر';
                }
            }
        }
        
        function checkCanStartGame() {
            const players = Object.values(state.users).filter(u => u.isPlayer && u.joined);
            
            if (players.length === 2) {
                const votes1 = state.votes[players[0]?.id];
                const votes2 = state.votes[players[1]?.id];
                
                if (votes1 && votes2 && votes1 === votes2) {
                    elements.startGameBtn.classList.add('active');
                }
            }
        }
        
        function startGame() {
            if (!state.gameSelected) return;
            
            state.gameStarted = true;
            elements.selectionScreen.classList.add('hidden');
            elements.playScreen.classList.remove('hidden');
            elements.gameStatus.textContent = 'اللعبة: XO';
            
            initXOGame();
        }
        
        function initXOGame() {
            const players = Object.values(state.users).filter(u => u.isPlayer && u.joined);
            if (players.length >= 2) {
                state.xoPlayers = {
                    [players[0].id]: 'X',
                    [players[1].id]: 'O'
                };
                state.xoCurrentPlayer = players[0].id;
                
                createXOBoard();
                updateGameStatus();
                addSystemMessage('بدأت لعبة XO! دور ' + players[0].name);
            }
        }
        
        function createXOBoard() {
            elements.xoBoard.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'xo-cell';
                cell.dataset.index = i;
                
                if (state.xoBoard[i]) {
                    cell.textContent = state.xoBoard[i];
                    cell.classList.add('disabled', state.xoBoard[i].toLowerCase());
                } else {
                    cell.textContent = '';
                }
                
                cell.addEventListener('click', () => makeXOMove(i));
                elements.xoBoard.appendChild(cell);
            }
        }
        
        function makeXOMove(index) {
            if (!state.gameStarted || state.xoBoard[index] || !state.isPlayer || state.xoCurrentPlayer !== userId) {
                return;
            }
            
            const symbol = state.xoPlayers[userId];
            state.xoBoard[index] = symbol;
            
            updateXOBoard();
            
            const winner = checkXOWinner();
            if (winner) {
                const winnerName = winner === 'X' ? 
                    Object.keys(state.xoPlayers).find(key => state.xoPlayers[key] === 'X') : 
                    Object.keys(state.xoPlayers).find(key => state.xoPlayers[key] === 'O');
                
                elements.gameStatus.textContent = `🏆 الفائز: ${state.users[winnerName]?.name || 'اللاعب'}`;
                state.gameStarted = false;
                addSystemMessage(`🎉 فاز ${state.users[winnerName]?.name || 'اللاعب'} باللعبة!`);
                return;
            }
            
            if (!state.xoBoard.includes('')) {
                elements.gameStatus.textContent = '🤝 تعادل!';
                state.gameStarted = false;
                addSystemMessage('🤝 اللعبة انتهت بالتعادل');
                return;
            }
            
            const players = Object.values(state.users).filter(u => u.isPlayer && u.joined);
            state.xoCurrentPlayer = state.xoCurrentPlayer === players[0].id ? players[1].id : players[0].id;
            
            updateGameStatus();
        }
        
        function updateXOBoard() {
            const cells = elements.xoBoard.children;
            for (let i = 0; i < 9; i++) {
                cells[i].textContent = state.xoBoard[i];
                if (state.xoBoard[i]) {
                    cells[i].classList.add('disabled', state.xoBoard[i].toLowerCase());
                } else {
                    cells[i].classList.remove('disabled', 'x', 'o');
                }
            }
        }
        
        function checkXOWinner() {
            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];
            
            for (const pattern of winPatterns) {
                const [a,b,c] = pattern;
                if (state.xoBoard[a] && state.xoBoard[a] === state.xoBoard[b] && state.xoBoard[a] === state.xoBoard[c]) {
                    return state.xoBoard[a];
                }
            }
            return null;
        }
        
        function updateGameStatus() {
            const player = Object.values(state.users).find(u => u.id === state.xoCurrentPlayer);
            elements.gameStatus.textContent = `دور: ${player?.name || 'اللاعب الآخر'}`;
        }
        
        function updatePlayersList() {
            const players = Object.values(state.users);
            let html = '';
            
            players.forEach(player => {
                const avatar = player.name.charAt(0).toUpperCase();
                const isCreator = player.id === creatorId;
                const isCurrent = player.id === userId;
                
                let badges = '';
                if (isCreator) badges += '<span class="badge creator">👑 منشئ</span>';
                if (player.isPlayer) badges += '<span class="badge player">🎮 لاعب</span>';
                else badges += '<span class="badge spectator">👀 متفرج</span>';
                if (player.joined) badges += '<span class="badge online">🟢 متصل</span>';
                
                html += `
                    <div class="player-card" style="${isCurrent ? 'border: 2px solid #3b82f6;' : ''}">
                        <div class="player-avatar">${avatar}</div>
                        <div class="player-info">
                            <div class="player-name">
                                ${player.name} ${badges}
                            </div>
                            <div class="player-status">${player.id.substring(0, 8)}...</div>
                        </div>
                    </div>
                `;
            });
            
            elements.playersList.innerHTML = html;
            elements.playerCount.textContent = players.length;
            elements.roomStatus.textContent = players.length >= 2 ? '👥 جاهز' : '⏳ انتظار';
        }
        
        function sendChatMessage() {
            const message = elements.chatInput.value.trim();
            if (!message) return;
            
            addChatMessage(userName, message, true);
            elements.chatInput.value = '';
        }
        
        function addChatMessage(sender, message, isOwn = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${isOwn ? 'own' : ''}`;
            msgDiv.textContent = `${sender}: ${message}`;
            elements.chatMessages.appendChild(msgDiv);
            elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
        }
        
        function addSystemMessage(message) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message system';
            msgDiv.textContent = message;
            elements.chatMessages.appendChild(msgDiv);
            elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
        }
        
        // بدء التطبيق
        init();
    </script>
</body>
    </html>
